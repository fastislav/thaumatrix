<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔮 THAUMATRIX — Резонансный эзотерический движок</title>
  <link rel="preconnect" href="https://googleapis.com">
  <link href="https://googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-deep: #050508; --bg-purple: #1a0b2e;
      --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #e5e5e5; --text-muted: #a0a0a0;
      --accent: #c5a0ff; --accent-glow: #9d4edd;
      --gold: #ffd166; --gold-glow: #e09f3e; --success: #06d6a0;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: radial-gradient(circle at 50% 0%, var(--bg-purple) 0%, var(--bg-deep) 60%);
      color: var(--text-main); font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh; overflow-x: hidden; line-height: 1.6; position: relative;
    }

    /* === ТВОЙ ОРИГИНАЛЬНЫЙ КОСМИЧЕСКИЙ ФОН === */
    #cosmicBg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0; animation: fall linear infinite; }
    .meteor { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 0 0 8px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,1); animation: meteor 5s linear infinite; opacity: 0; }
    .meteor::before { content: ''; position: absolute; top: 50%; transform: translateY(-50%); width: 300px; height: 1px; background: linear-gradient(90deg, #fff, transparent); right: 1px; }
    
    .planet { position: absolute; border-radius: 50%; opacity: 0.6; animation: float 20s ease-in-out infinite; }
    .planet-1 { width: 60px; height: 60px; background: radial-gradient(circle at 30% 30%, var(--gold), var(--gold-glow)); top: 10%; left: 10%; box-shadow: 0 0 30px rgba(255, 209, 102, 0.4); }
    .planet-2 { width: 40px; height: 40px; background: radial-gradient(circle at 30% 30%, var(--accent), var(--accent-glow)); top: 60%; left: 85%; box-shadow: 0 0 25px rgba(197, 160, 255, 0.4); animation-delay: -5s; }
    .planet-3 { width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, var(--success), #04a87d); top: 70%; left: 5%; box-shadow: 0 0 35px rgba(6, 214, 160, 0.3); animation-delay: -10s; }
    .planet-4 { width: 50px; height: 50px; background: radial-gradient(circle at 30% 30%, #ff6b6b, #ee5a5a); top: 20%; left: 80%; box-shadow: 0 0 28px rgba(255, 107, 107, 0.4); animation-delay: -15s; }

    @keyframes fall { 0% { transform: translateY(-100vh) scale(0.5); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(100vh) scale(1); opacity: 0; } }
    @keyframes meteor { 0% { transform: rotate(215deg) translateX(0); opacity: 0; } 10% { opacity: 1; } 70% { opacity: 1; } 100% { transform: rotate(215deg) translateX(-1000px); opacity: 0; } }
    @keyframes float { 0%, 100% { transform: translateY(0) translateX(0); } 33% { transform: translateY(-20px) translateX(10px); } 66% { transform: translateY(10px) translateX(-10px); } }
    
    /* === ИНТЕРФЕЙС === */
    header { position: relative; z-index: 10; text-align: center; padding: 3rem 1rem 1rem; }
    .logo { font-family: 'Playfair Display', serif; font-size: 2.5rem; background: linear-gradient(135deg, var(--gold), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(157, 78, 221, 0.3); margin-bottom: 0.5rem; }
    .tagline { color: var(--text-muted); font-size: 1rem; font-style: italic; letter-spacing: 1px; }
    
    .container { max-width: 1000px; margin: 0 auto; padding: 2rem; position: relative; z-index: 10; }
    .input-section { background: rgba(15, 15, 20, 0.6); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 2.5rem; backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 3rem; border-top: 1px solid rgba(255,255,255,0.2); }
    
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
    label { font-size: 0.9rem; color: var(--gold); font-weight: 500; letter-spacing: 0.5px; }
    
    input { padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff; font-size: 1rem; transition: all 0.3s; width: 100%; }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 15px rgba(157, 78, 221, 0.3); }

    .geo-wrapper { position: relative; }
    .geo-btn { position: absolute; right: 8px; top: 32px; background: var(--gold); border: none; border-radius: 8px; padding: 0.5rem 1rem; cursor: pointer; color: #000; font-weight: 700; font-size: 0.85rem; transition: transform 0.2s; z-index: 5; }
    .geo-btn:hover { transform: scale(1.05); }
    .geo-status { font-size: 0.8rem; margin-top: 5px; min-height: 25px; color: var(--text-muted); }

    .calculate-btn { width: 100%; padding: 1.2rem; background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: #fff; font-weight: 700; font-size: 1.1rem; border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; }
    .calculate-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(106, 17, 203, 0.5); }

    /* === БЛОК РЕЗУЛЬТАТОВ === */
    .results-section { display: none; animation: fadeIn 0.8s ease-out; }
    .results-section.show { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .module-card { background: rgba(20, 20, 25, 0.7); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; backdrop-filter: blur(10px); }
    .module-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; }
    
    .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; }
    .result-item { 
      background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 10px;
      text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: all 0.3s;
    }
    .result-item:hover { transform: translateY(-3px); background: rgba(255,255,255,0.08); border-color: var(--accent); }
    
    .result-value { font-size: 1.8rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
    .result-label { font-size: 0.85rem; color: var(--text-muted); }
    
    .resonance-box { background: linear-gradient(135deg, rgba(157, 78, 221, 0.2), rgba(255, 209, 102, 0.1)); border: 2px solid var(--accent); border-radius: var(--radius); padding: 2.5rem; margin-top: 2rem; text-align: center; animation: pulse 3s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(157, 78, 221, 0.3); } 50% { box-shadow: 0 0 40px rgba(157, 78, 221, 0.6); } }
    .resonance-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--gold); margin-bottom: 0.5rem; }
  </style>
</head>
<body>

<div id="cosmicBg"></div>
<div class="planet planet-1"></div>
<div class="planet planet-2"></div>
<div class="planet planet-3"></div>
<div class="planet planet-4"></div>

<header>
  <div class="logo">THAUMATRIX</div>
  <div class="tagline">Резонансный эзотерический движок</div>
</header>

<div class="container">
  <div class="input-section">
    <div class="form-grid">
      <div class="input-group">
        <label>Дата рождения</label>
        <input type="date" id="birthDate">
      </div>
      <div class="input-group">
        <label>Время рождения</label>
        <input type="time" id="birthTime">
      </div>
      <div class="input-group geo-wrapper">
        <label>Место резонанса</label>
        <input type="text" id="location" placeholder="Город или координаты">
        <button class="geo-btn" onclick="getLocation()">ГЕО</button>
        <div id="geoStatus" class="geo-status"></div>
      </div>
    </div>
    <button class="calculate-btn" onclick="initResonance()">Активировать расчет</button>
  </div>

  <div class="results-section" id="results">
    <div class="module-card">
      <div class="module-title">🔮 Матрица Судьбы</div>
      <div class="result-grid">
        <div class="result-item">
          <div class="result-value" id="res-day">--</div>
          <div class="result-label">Энергия личности</div>
        </div>
        <div class="result-item">
          <div class="result-value" id="res-month">--</div>
          <div class="result-label">Духовный канал</div>
        </div>
        <div class="result-item">
          <div class="result-value" id="res-year">--</div>
          <div class="result-label">Кармический узел</div>
        </div>
        <div class="result-item">
          <div class="result-value" id="res-destiny">--</div>
          <div class="result-label">Предназначение</div>
        </div>
      </div>
    </div>

    <div class="resonance-box">
      <div class="resonance-title" id="totalResonance">0%</div>
      <p style="color: var(--accent); font-weight: 600;">ИНДЕКС РЕЗОНАНСА</p>
      <p id="resonanceDesc" style="margin-top: 1rem; color: var(--text-muted); font-size: 0.9rem;"></p>
    </div>
  </div>
</div>

<script>
  // === 1. ТВОИ ОРИГИНАЛЬНЫЕ АНИМАЦИИ (ЗВЕЗДЫ И МЕТЕОРЫ) ===
  const bg = document.getElementById('cosmicBg');
  
  function createStars() {
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDuration = (Math.random() * 3 + 2) + 's';
      star.style.animationDelay = Math.random() * 5 + 's';
      bg.appendChild(star);
    }
  }

  function createMeteors() {
    setInterval(() => {
      const meteor = document.createElement('div');
      meteor.className = 'meteor';
      meteor.style.left = Math.random() * 100 + '%';
      meteor.style.top = Math.random() * 50 + '%';
      bg.appendChild(meteor);
      setTimeout(() => meteor.remove(), 5000);
    }, 3000);
  }

  createStars();
  createMeteors();

  // === 2. ЛОГИКА ГЕОЛОКАЦИИ ===
  function getLocation() {
    const status = document.getElementById('geoStatus');
    if (navigator.geolocation) {
      status.innerText = "Считывание координат...";
      navigator.geolocation.getCurrentPosition(
        (p) => {
          status.innerText = `✅ Точка: ${p.coords.latitude.toFixed(2)}, ${p.coords.longitude.toFixed(2)}`;
          document.getElementById('location').value = `${p.coords.latitude.toFixed(2)}, ${p.coords.longitude.toFixed(2)}`;
        },
        () => { status.innerText = "❌ Ошибка доступа к ГЕО"; }
      );
    }
  }

  // === 3. МАТЕМАТИЧЕСКИЙ ДВИЖОК (МЕТОД 22 АРКАНОВ) ===
  function getArcana(num) {
    let result = num;
    while (result > 22) {
      result = String(result).split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
    }
    return result === 0 ? 22 : result;
  }

  function initResonance() {
    const dateInput = document.getElementById('birthDate').value;
    const timeInput = document.getElementById('birthTime').value;

    if (!dateInput) {
      alert("Введите дату для инициации!");
      return;
    }

    const [year, month, day] = dateInput.split('-').map(Number);

    // Точные расчеты
    const arcDay = getArcana(day);
    const arcMonth = getArcana(month);
    const arcYear = getArcana(year);
    const arcDestiny = getArcana(arcDay + arcMonth + arcYear);

    // Расчет влияния времени на Индекс
    let timeFactor = 1;
    if (timeInput) {
      const [h, m] = timeInput.split(':').map(Number);
      timeFactor = (h + m/60) / 24 + 0.5;
    }
    const finalResonance = Math.min(100, Math.floor(((arcDay + arcMonth + arcYear + arcDestiny) / 88) * 100 * timeFactor));

    // Вывод в UI
    document.getElementById('res-day').innerText = arcDay;
    document.getElementById('res-month').innerText = arcMonth;
    document.getElementById('res-year').innerText = arcYear;
    document.getElementById('res-destiny').innerText = arcDestiny;
    document.getElementById('totalResonance').innerText = finalResonance + "%";

    const desc = document.getElementById('resonanceDesc');
    if (finalResonance > 75) desc.innerText = "Матрица в состоянии гипер-резонанса. Путь открыт.";
    else if (finalResonance > 45) desc.innerText = "Стабильный поток. Энергии сбалансированы.";
    else desc.innerText = "Низкая вибрация. Требуется корректировка намерений.";

    // Показ результатов
    const resultsBlock = document.getElementById('results');
    resultsBlock.classList.add('show');
    resultsBlock.scrollIntoView({ behavior: 'smooth' });
  }
</script>

</body>
</html>
