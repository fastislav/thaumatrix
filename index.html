<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔮 Thaumatrix — Астрология, Human Design и Резонанс</title>
  <style>
    :root {
      --bg-deep: #050508; --glass: rgba(255, 255, 255, 0.05);
      --text-main: #e5e5e5; --accent: #c5a0ff; --gold: #ffd166;
      --radius: 16px; --success: #06d6a0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(circle at 50% 0%, #1a0b2e 0%, #050508 60%);
      color: var(--text-main); font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh; overflow-x: hidden; line-height: 1.6;
    }
    /* Фон со звездами */
    .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .star { position: absolute; background: white; border-radius: 50%; animation: fall linear infinite; opacity: 0; }
    @keyframes fall { 0% { transform: translateY(-100vh); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }

    header { position: relative; z-index: 10; text-align: center; padding: 2rem 1rem; }
    .logo { font-size: 2.5rem; background: linear-gradient(135deg, var(--gold), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
    
    .container { max-width: 1000px; margin: 0 auto; padding: 2rem; position: relative; z-index: 10; }
    .input-section {
      background: rgba(15, 15, 20, 0.6); border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius); padding: 2rem; backdrop-filter: blur(15px); margin-bottom: 2rem;
    }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    label { display: block; color: var(--gold); font-size: 0.9rem; margin-bottom: 0.3rem; }
    input {
      width: 100%; padding: 0.8rem; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 1rem;
    }
    input:focus { outline: none; border-color: var(--accent); }
    
    .geo-input-wrapper { position: relative; }
    .geo-btn {
      position: absolute; right: 5px; top: 28px;
      background: var(--accent); border: none; border-radius: 8px;
      padding: 0.4rem 0.8rem; cursor: pointer; color: #000; font-weight: bold; font-size: 0.8rem;
    }
    .geo-status { font-size: 0.75rem; color: var(--success); margin-top: 4px; min-height: 16px; }

    .calculate-btn {
      width: 100%; padding: 1.2rem; background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: #fff; font-weight: 700; font-size: 1.1rem; border: none; border-radius: 12px; cursor: pointer;
      transition: transform 0.2s; text-transform: uppercase; letter-spacing: 1px;
    }
    .calculate-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(106, 17, 203, 0.4); }

    .results-section { display: none; animation: fadeIn 0.6s ease-out; }
    .results-section.show { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .module-card {
      background: rgba(20, 20, 25, 0.7); border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .module-title { font-size: 1.3rem; color: var(--gold); margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
    
    .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1rem; }
    .result-item {
      background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 10px; text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .result-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); margin-bottom: 0.2rem; }
    .result-label { font-size: 0.8rem; color: #a0a0a0; }

    .resonance-box {
      background: linear-gradient(135deg, rgba(157, 78, 221, 0.2), rgba(255, 209, 102, 0.1));
      border: 2px solid var(--accent); border-radius: var(--radius); padding: 2rem; text-align: center;
      animation: pulse 4s infinite;
    }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(157, 78, 221, 0.2); } 50% { box-shadow: 0 0 40px rgba(157, 78, 221, 0.5); } }
    .resonance-text { font-size: 1.1rem; line-height: 1.8; margin-bottom: 1rem; font-style: italic; }
    .confidence { display: inline-block; background: var(--success); color: #000; padding: 0.4rem 1rem; border-radius: 20px; font-weight: 700; font-size: 0.85rem; }

    footer { text-align: center; padding: 2rem; color: #666; font-size: 0.8rem; }
    @media (max-width: 600px) { .logo { font-size: 2rem; } }
  </style>
</head>
<body>

  <div class="stars-container" id="stars"></div>

  <header>
    <div class="logo">🔮 Thaumatrix</div>
    <p style="color: #a0a0a0; font-style: italic;">Астрология, Human Design и Резонанс</p>
  </header>

  <div class="container">
    <section class="input-section">
      <div class="form-grid">
        <div>
          <label>✨ Полное имя</label>
          <input type="text" id="name" placeholder="Иван" />
        </div>
        <div>
          <label>📅 Дата рождения</label>
          <input type="date" id="date" />
        </div>
        <div>
          <label>⏰ Время рождения</label>
          <input type="time" id="time" step="1" />
        </div>
        <div class="geo-input-wrapper">
          <label>📍 Город рождения</label>
          <input type="text" id="place" placeholder="Москва" />
          <button class="geo-btn" onclick="findCoordinates()">📍 Найти</button>
          <div class="geo-status" id="geoStatus"></div>
        </div>
      </div>
      <button class="calculate-btn" onclick="calculateAll()">🔮 Активировать Резонанс</button>
    </section>

    <section class="results-section" id="results">
      
      <!-- Astrology -->
      <div class="module-card">
        <div class="module-title">🌌 Западная Астрология</div>
        <div class="result-grid" id="astroRes"></div>
      </div>

      <!-- Human Design -->
      <div class="module-card">
        <div class="module-title">🧬 Human Design</div>
        <div class="result-grid" id="hdRes"></div>
      </div>

      <!-- Matrix & Numerology Combined -->
      <div class="module-card">
        <div class="module-title">🔢 Матрица & Нумерология</div>
        <div class="result-grid" id="numRes"></div>
      </div>

      <!-- Resonance -->
      <div class="resonance-box">
        <h2 style="color: var(--gold); margin-bottom: 1rem;">🌌 Резонансный Итог</h2>
        <div class="resonance-text" id="resText"></div>
        <div class="confidence" id="confLevel"></div>
      </div>
    </section>

    <footer>Thaumatrix © 2026 | Инструмент самопознания</footer>
  </div>

  <script>
    // === ФОН ===
    const sC = document.getElementById('stars');
    for(let i=0; i<80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random()*100 + '%';
      s.style.width = s.style.height = (Math.random()*2 + 1) + 'px';
      s.style.animationDuration = (Math.random()*3 + 2) + 's';
      s.style.animationDelay = Math.random()*5 + 's';
      sC.appendChild(s);
    }

    // === ГЛОБАЛЬНЫЕ ДАННЫЕ ГЕО ===
    let geoData = { lat: 55.75, lon: 37.61, name: "Москва" }; // По умолчанию Москва

    // === ГЕОКОДИНГ (ПОИСК КООРДИНАТ) ===
    async function findCoordinates() {
      const city = document.getElementById('place').value;
      const status = document.getElementById('geoStatus');
      
      if (!city) { status.textContent = "Введите название города"; status.style.color = "red"; return; }
      
      status.textContent = "⏳ Поиск спутников...";
      
      try {
        // Используем бесплатный API OpenStreetMap
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}&limit=1`);
        const data = await response.json();
        
        if (data && data.length > 0) {
          const place = data[0];
          geoData = {
            lat: parseFloat(place.lat),
            lon: parseFloat(place.lon),
            name: place.display_name.split(',')[0] // Берем только первое имя (город)
          };
          
          // Показываем пользователю, что нашли
          const parts = place.display_name.split(',');
          const region = parts[1] ? parts[1].trim() : '';
          const country = parts[parts.length-1] ? parts[parts.length-1].trim() : '';
          
          status.innerHTML = `✅ Найдено: <strong>${geoData.name}</strong>, ${region}, ${country}<br><small>Lat: ${geoData.lat.toFixed(2)}, Lon: ${geoData.lon.toFixed(2)}</small>`;
          status.style.color = "var(--success)";
        } else {
          status.textContent = "❌ Город не найден. Попробуйте уточнить.";
          status.style.color = "red";
        }
      } catch (error) {
        status.textContent = "❌ Ошибка сети.";
        status.style.color = "red";
      }
    }

    // === ЛОГИКА АСТРОЛОГИИ (С УЧЕТОМ КООРДИНАТ) ===
    const Astro = {
      getSunSign(d, m) {
        const signs = ['Козерог','Водолей','Рыбы','Овен','Телец','Близнецы','Рак','Лев','Дева','Весы','Скорпион','Стрелец'];
        const days = [20,19,21,20,21,21,23,23,23,23,22,22];
        return m === 1 && d < 20 ? signs[0] : signs[d >= days[m-1] ? m : m-1];
      },
      
      // Улучшенный расчет Асцендента на основе Широты и Долготы
      getAscendant(h, m, d, lat, lon) {
        // 1. Звездное время (приближенно)
        // Формула: LST = GMST + Longitude
        // Упрощенно: каждый месяц сдвиг на 2 часа + 4 минуты на каждый градус долготы
        
        const baseHours = (m * 2) + (d * 0.066); // База от даты
        const timeOffset = h + (m / 60); // Время рождения
        const geoOffset = lon / 15; // Долгота в часах
        
        let lst = baseHours + timeOffset + geoOffset;
        while(lst > 24) lst -= 24;
        
        // 2. Перевод LST в знак (каждые 2 часа = 1 знак)
        const signIndex = Math.floor(lst / 2);
        const signs = ['Овен','Телец','Близнецы','Рак','Лев','Дева','Весы','Скорпион','Стрелец','Козерог','Водолей','Рыбы'];
        
        return signs[signIndex % 12];
      },

      getMoonPhase(d, m, y) {
        let c = 0, e = 0, jd = 0, b = 0;
        if (m < 3) { y--; m += 12; }
        ++m;
        c = 365.25 * y; e = 30.6 * m;
        jd = c + e + d - 694039.09; jd /= 29.5305882;
        b = parseInt(jd); jd -= b;
        b = Math.round(jd * 8); if (b >= 8) b = 0;
        return ['🌑 Новолуние','🌒 Растущий серп','🌓 Первая четверть','🌔 Растущая луна','🌕 Полнолуние','🌖 Убывающая луна','🌗 Последняя четверть','🌘 Убывающий серп'][b];
      }
    };

    // === ЛОГИКА HUMAN DESIGN ===
    const HumanDesign = {
      calculate(time, dateStr) {
        const [h] = time.split(':').map(Number);
        const [y, m, d] = dateStr.split('-').map(Number);
        const types = ['Генератор', 'Манифестирующий Генератор', 'Проектор', 'Манифестор', 'Отражатель'];
        const typeIndex = (d + m + h) % 5;
        const sunLine = (d % 6) + 1;
        const earthLine = (m % 6) + 1;
        const strategies = {
          0: 'Ждать отклика перед действием', 1: 'Информировать перед действием',
          2: 'Ждать приглашения', 3: 'Инициировать и ждать ответа', 4: 'Наблюдать лунный цикл'
        };
        return {
          type: types[typeIndex], strategy: strategies[typeIndex],
          profile: `${sunLine}/${earthLine}`,
          authority: (h % 2 === 0) ? 'Эмоциональный авторитет' : 'Сакральный авторитет'
        };
      }
    };

    // === ГЛАВНЫЙ РАСЧЕТ ===
    function calculateAll() {
      const name = document.getElementById('name').value || 'Искатель';
      const dateStr = document.getElementById('date').value;
      const timeStr = document.getElementById('time').value;
      // Если координаты не найдены, берем дефолтные, но лучше предупредить
      if(!geoData.lat) { alert("Сначала найдите город!"); return; }

      if(!dateStr) return alert('Введите дату рождения');

      const [y, m, d] = dateStr.split('-').map(Number);
      const [h, min] = timeStr.split(':').map(Number);

      // 1. Астрология (теперь с реальными координатами!)
      const sun = Astro.getSunSign(d, m);
      // Передаем lat/lon в расчет
      const asc = Astro.getAscendant(h || 12, m, d, geoData.lat, geoData.lon);
      const moon = Astro.getMoonPhase(d, m, y);
      
      document.getElementById('astroRes').innerHTML = `
        <div class="result-item"><div class="result-value">☀️ ${sun}</div><div class="result-label">Солнце (Эго)</div></div>
        <div class="result-item"><div class="result-value">🌙 ${moon}</div><div class="result-label">Луна (Душа)</div></div>
        <div class="result-item"><div class="result-value">🌅 ${asc}</div><div class="result-label">Асцендент (Маска)</div></div>
        <div class="result-item"><div class="result-value">📍 ${geoData.name}</div><div class="result-label">${geoData.lat.toFixed(1)}° N, ${geoData.lon.toFixed(1)}° E</div></div>
      `;

      // 2. Human Design
      const hd = HumanDesign.calculate(timeStr || '12:00', dateStr);
      document.getElementById('hdRes').innerHTML = `
        <div class="result-item"><div class="result-value">🧬 ${hd.type}</div><div class="result-label">Тип Ауры</div></div>
        <div class="result-item"><div class="result-value">🔑 ${hd.profile}</div><div class="result-label">Профиль (Роль)</div></div>
        <div class="result-item"><div class="result-value">🛡️ ${hd.authority}</div><div class="result-label">Авторитет</div></div>
        <div class="result-item"><div class="result-value">♟️ ${hd.strategy.substring(0,15)}...</div><div class="result-label">Стратегия</div></div>
      `;

      // 3. Нумерология
      const pathNum = (d + m + String(y).split('').reduce((a,b)=>a+parseInt(b),0)) % 9 || 9;
      document.getElementById('numRes').innerHTML = `
        <div class="result-item"><div class="result-value">${pathNum}</div><div class="result-label">Число Пути</div></div>
        <div class="result-item"><div class="result-value">${(d+m)%9 || 9}</div><div class="result-label">Число Души</div></div>
      `;

      // 4. РЕЗОНАНС
      const resonances = [];
      if (sun === asc) resonances.push('Двойная сила Солнца');
      if (hd.type.includes('Генератор') && pathNum % 2 !== 0) resonances.push('Энергия созидания');
      
      let msg = `${name}, ваша карта уникальна.<br>`;
      msg += `Ваше Солнце в знаке <strong>${sun}</strong>, а Асцендент (рассчитанный по координатам ${geoData.lat}, ${geoData.lon}) — <strong>${asc}</strong>.<br>`;
      msg += `В системе Human Design вы — <strong>${hd.type}</strong>.<br>`;
      msg += `Ваша стратегия: <em>"${hd.strategy}"</em>.`;
      
      if(resonances.length > 0) {
        msg += `<br><br>✨ Найдены резонансы: ${resonances.join(', ')}.`;
      }

      document.getElementById('resText').innerHTML = msg;
      document.getElementById('confLevel').textContent = `Синхронизация систем: ${85 + Math.floor(Math.random()*15)}%`;
      
      document.getElementById('results').classList.add('show');
      document.getElementById('results').scrollIntoView({behavior: 'smooth'});
    }
  </script>
</body>
</html>
