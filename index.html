<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔮 THAUMATRIX — Резонансный эзотерический движок</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-deep: #050508; --bg-purple: #1a0b2e;
      --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #e5e5e5; --text-muted: #a0a0a0;
      --accent: #c5a0ff; --accent-glow: #9d4edd;
      --gold: #ffd166; --gold-glow: #e09f3e; --success: #06d6a0;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: radial-gradient(circle at 50% 0%, var(--bg-purple) 0%, var(--bg-deep) 60%);
      color: var(--text-main); font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh; overflow-x: hidden; line-height: 1.6; position: relative;
    }
    /* === КОСМИЧЕСКИЙ ФОН === */
    #cosmicBg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0; animation: fall linear infinite; }
    .meteor { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 0 0 8px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,1); animation: meteor 5s linear infinite; opacity: 0; }
    .meteor::before { content: ''; position: absolute; top: 50%; transform: translateY(-50%); width: 300px; height: 1px; background: linear-gradient(90deg, #fff, transparent); right: 1px; }
    .planet { position: absolute; border-radius: 50%; opacity: 0.6; animation: float 20s ease-in-out infinite; }
    .planet-1 { width: 60px; height: 60px; background: radial-gradient(circle at 30% 30%, var(--gold), var(--gold-glow)); top: 10%; left: 10%; box-shadow: 0 0 30px rgba(255, 209, 102, 0.4); }
    .planet-2 { width: 40px; height: 40px; background: radial-gradient(circle at 30% 30%, var(--accent), var(--accent-glow)); top: 60%; left: 85%; box-shadow: 0 0 25px rgba(197, 160, 255, 0.4); animation-delay: -5s; }
    .planet-3 { width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, var(--success), #04a87d); top: 70%; left: 5%; box-shadow: 0 0 35px rgba(6, 214, 160, 0.3); animation-delay: -10s; }
    .planet-4 { width: 50px; height: 50px; background: radial-gradient(circle at 30% 30%, #ff6b6b, #ee5a5a); top: 20%; left: 80%; box-shadow: 0 0 28px rgba(255, 107, 107, 0.4); animation-delay: -15s; }
    @keyframes fall { 0% { transform: translateY(-100vh) scale(0.5); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { transform: translateY(100vh) scale(1); opacity: 0; } }
    @keyframes meteor { 0% { transform: rotate(215deg) translateX(0); opacity: 0; } 10% { opacity: 1; } 70% { opacity: 1; } 100% { transform: rotate(215deg) translateX(-1000px); opacity: 0; } }
    @keyframes float { 0%, 100% { transform: translateY(0) translateX(0); } 33% { transform: translateY(-20px) translateX(10px); } 66% { transform: translateY(10px) translateX(-10px); } }
    
    /* === UI === */
    header { position: relative; z-index: 10; text-align: center; padding: 3rem 1rem 1rem; }
    .logo { font-family: 'Playfair Display', serif; font-size: 2.5rem; background: linear-gradient(135deg, var(--gold), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(157, 78, 221, 0.3); margin-bottom: 0.5rem; }
    .tagline { color: var(--text-muted); font-size: 1rem; font-style: italic; letter-spacing: 1px; }
    .container { max-width: 1000px; margin: 0 auto; padding: 2rem; position: relative; z-index: 10; }
    .input-section { background: rgba(15, 15, 20, 0.6); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 2.5rem; backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 3rem; border-top: 1px solid rgba(255,255,255,0.2); }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
    label { font-size: 0.9rem; color: var(--gold); font-weight: 500; letter-spacing: 0.5px; }
    input { padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff; font-size: 1rem; transition: all 0.3s; }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 15px rgba(157, 78, 221, 0.3); background: rgba(255, 255, 255, 0.08); }
    .geo-wrapper { position: relative; }
    .geo-btn { position: absolute; right: 8px; top: 42px; background: var(--gold); border: none; border-radius: 8px; padding: 0.5rem 1rem; cursor: pointer; color: #000; font-weight: 700; font-size: 0.85rem; transition: transform 0.2s; }
    .geo-btn:hover { transform: scale(1.05); }
    .geo-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .geo-status { font-size: 0.8rem; margin-top: 5px; min-height: 35px; line-height: 1.4; color: var(--text-muted); }
    .geo-status.success { color: var(--success); }
    .geo-status.error { color: #e74c3c; }
    .calculate-btn { width: 100%; padding: 1.2rem; background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: #fff; font-weight: 700; font-size: 1.1rem; border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; }
    .calculate-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(106, 17, 203, 0.5); }
    .calculate-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .results-section { display: none; animation: fadeIn 0.8s ease-out; }
    .results-section.show { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .module-card { background: rgba(20, 20, 25, 0.7); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; backdrop-filter: blur(10px); }
    .module-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; }
    .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; }
    
    /* === КЛИКАБЕЛЬНЫЕ КАРТОЧКИ === */
    .result-item { 
      background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 10px;
      text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
      transition: all 0.3s; position: relative; overflow: hidden;
    }
    .result-item:hover { 
      transform: translateY(-3px); background: rgba(255,255,255,0.08);
      border-color: var(--accent); box-shadow: 0 5px 20px rgba(197, 160, 255, 0.3);
    }
    .result-item::after {
      content: '🔍'; position: absolute; top: 5px; right: 5px;
      font-size: 0.7rem; opacity: 0; transition: opacity 0.3s;
    }
    .result-item:hover::after { opacity: 0.6; }
    
    .result-value { font-size: 1.8rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
    .result-label { font-size: 0.85rem; color: var(--text-muted); }
    
    .resonance-box { background: linear-gradient(135deg, rgba(157, 78, 221, 0.2), rgba(255, 209, 102, 0.1)); border: 2px solid var(--accent); border-radius: var(--radius); padding: 2.5rem; margin-top: 2rem; text-align: center; position: relative; overflow: hidden; animation: pulse 3s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(157, 78, 221, 0.3); } 50% { box-shadow: 0 0 40px rgba(157, 78, 221, 0.6); } }
    .resonance-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold); margin-bottom: 1.5rem; text-shadow: 0 0 10px rgba(255, 209, 102, 0.5); }
    .resonance-text { font-size: 1.2rem; line-height: 1.9; margin-bottom: 1.5rem; font-style: italic; color: var(--text-main); }
    .resonance-highlights { display: flex; flex-wrap: wrap; gap: 0.8rem; justify-content: center; margin: 1.5rem 0; }
    .highlight-tag { background: rgba(197, 160, 255, 0.2); border: 1px solid var(--accent); padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.9rem; color: var(--accent); }
    .confidence { display: inline-block; background: var(--success); color: #000; padding: 0.5rem 1.2rem; border-radius: 20px; font-weight: 700; font-size: 0.9rem; margin-top: 1rem; }
    footer { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 0.85rem; position: relative; z-index: 10; }
    @media (max-width: 600px) { .logo { font-size: 2rem; } .input-section { padding: 1.5rem; } .resonance-text { font-size: 1rem; } }
    
    /* === МОДАЛЬНОЕ ОКНО === */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000;
      justify-content: center; align-items: center; padding: 2rem;
    }
    .modal-overlay.show { display: flex; animation: modalFadeIn 0.3s; }
    @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .modal-content {
      background: linear-gradient(135deg, #1a0b2e, #0a0a1a);
      border: 2px solid var(--accent); border-radius: 20px;
      max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto;
      padding: 2rem; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: transparent; border: none; color: var(--text-muted);
      font-size: 1.5rem; cursor: pointer; transition: color 0.3s;
    }
    .modal-close:hover { color: var(--text-main); }
    
    .modal-system-title {
      font-family: 'Playfair Display', serif; font-size: 1.8rem;
      color: var(--gold); margin-bottom: 1.5rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--glass-border);
    }
    .modal-section { margin-bottom: 1.5rem; }
    .modal-section h3 {
      color: var(--accent); font-size: 1.1rem; margin-bottom: 0.5rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .modal-section p, .modal-section li {
      color: var(--text-muted); line-height: 1.7; font-size: 0.95rem;
    }
    .modal-section ul { margin-left: 1.5rem; }
    .modal-source {
      background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 10px;
      border-left: 3px solid var(--gold); margin-top: 1rem;
    }
    .modal-source strong { color: var(--gold); }
  </style>
</head>
<body>
  <div id="cosmicBg"></div>
  <header>
    <div class="logo">🔮 Thaumatrix</div>
    <div class="tagline">Где системы сходятся в один голос</div>
  </header>

  <div class="container">
    <section class="input-section">
      <div class="form-grid">
        <div class="input-group"><label for="fullName">✨ Ваше полное имя</label><input type="text" id="fullName" placeholder="Иван Иванов" /></div>
        <div class="input-group"><label for="birthDate">📅 Дата рождения</label><input type="date" id="birthDate" /></div>
        <div class="input-group"><label for="birthTime">⏰ Время рождения (ЧЧ:ММ:СС)</label><input type="time" id="birthTime" step="1" placeholder="12:00:00" /></div>
        <div class="input-group geo-wrapper">
          <label for="birthPlace">📍 Город рождения</label>
          <input type="text" id="birthPlace" placeholder="Москва" />
          <button class="geo-btn" id="geoBtn">🔍 Поиск</button>
          <div class="geo-status" id="geoStatus"></div>
        </div>
      </div>
      <button class="calculate-btn" id="calcBtn">🔮 Активировать резонанс</button>
    </section>

    <section class="results-section" id="results">
      <div class="module-card" id="card-numerology" style="display:none"><div class="module-title">🔢 Нумерология</div><div class="result-grid" id="res-numerology"></div></div>
      <div class="module-card" id="card-matrix" style="display:none"><div class="module-title">🌀 Матрица Судьбы</div><div class="result-grid" id="res-matrix"></div></div>
      <div class="module-card" id="card-tarot" style="display:none"><div class="module-title">🃏 Таро</div><div class="result-grid" id="res-tarot"></div></div>
      <div class="module-card" id="card-astrology" style="display:none"><div class="module-title">🌌 Астрология</div><div class="result-grid" id="res-astrology"></div></div>
      <div class="module-card" id="card-runes" style="display:none"><div class="module-title">ᚚ Руны</div><div class="result-grid" id="res-runes"></div></div>
      
      <div class="module-card" id="card-ai" style="display:none; border-color: var(--gold); background: rgba(255, 209, 102, 0.05);">
        <div class="module-title" style="color: var(--gold)">🤖 Голос Оракула (AI)</div>
        <div id="oracle-output" style="font-size: 1rem; line-height: 1.6; text-align: left; padding: 1rem; background: rgba(0,0,0,0.3); border-radius: 8px;"></div>
      </div>

      <div class="resonance-box" id="resonanceBox">
        <div class="resonance-title">🌌 РЕЗОНАНСНЫЙ ИТОГ</div>
        <div class="resonance-text" id="resonanceText"></div>
        <div class="resonance-highlights" id="resonanceHighlights"></div>
        <div class="confidence" id="confidenceLevel"></div>
      </div>
    </section>
    <footer>Thaumatrix — инструмент для самопознания. Не заменяет консультацию специалиста.<br>Создано с магией и точностью | © 2026</footer>
  </div>

  <!-- Модальное окно -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent">
      <button class="modal-close" id="modalClose">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script type="module">
    // === 1. КОСМИЧЕСКИЙ ФОН ===
    function initCosmicBackground() {
      const container = document.getElementById('cosmicBg');
      if (!container) return;
      container.innerHTML = '';
      for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.animationDuration = (Math.random() * 3 + 2) + 's';
        star.style.animationDelay = Math.random() * 5 + 's';
        container.appendChild(star);
      }
      for (let i = 0; i < 5; i++) {
        const meteor = document.createElement('div');
        meteor.className = 'meteor';
        meteor.style.left = Math.random() * 100 + '%';
        meteor.style.top = Math.random() * 50 + '%';
        meteor.style.animationDuration = (Math.random() * 3 + 2) + 's';
        meteor.style.animationDelay = (Math.random() * 10 + i * 5) + 's';
        container.appendChild(meteor);
      }
      ['planet-1', 'planet-2', 'planet-3', 'planet-4'].forEach(cls => {
        const p = document.createElement('div');
        p.className = `planet ${cls}`;
        container.appendChild(p);
      });
    }

    // === 2. ГЕОЛОКАЦИЯ ===
    window.geoData = { lat: 55.7558, lon: 37.6173, name: 'Москва' };
    async function findCoordinates() {
      const city = document.getElementById('birthPlace').value.trim();
      const status = document.getElementById('geoStatus');
      const btn = document.getElementById('geoBtn');
      if (!city) { status.textContent = '❌ Введите город'; status.className = 'geo-status error'; return; }
      btn.disabled = true; btn.textContent = '⏳...';
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}&limit=1`);
        const data = await res.json();
        if (data.length > 0) {
          window.geoData = { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), name: data[0].display_name.split(',')[0] };
          status.innerHTML = `✅ ${window.geoData.name}<br><small>${window.geoData.lat.toFixed(2)}, ${window.geoData.lon.toFixed(2)}</small>`;
          status.className = 'geo-status success';
        } else { status.textContent = '❌ Не найдено'; status.className = 'geo-status error'; }
      } catch(e) { status.textContent = '❌ Ошибка сети'; status.className = 'geo-status error'; }
      finally { btn.disabled = false; btn.textContent = '🔍 Поиск'; }
    }
    document.getElementById('geoBtn').addEventListener('click', findCoordinates);

    // === 3. БИБЛИОТЕКА ЗНАНИЙ ===
    const KNOWLEDGE = {
      numerology: {
        name: 'Нумерология Пифагора',
        source: 'Древнегреческая традиция, VI век до н.э.',
        description: 'Система Пифагора основана на вибрации чисел от 1 до 9. Каждое число несет определенную энергию и архетип.',
        details: {
          lifePath: {
            title: 'Число Жизненного Пути',
            calc: 'Складывается день + месяц + год рождения, затем цифры сводятся к одному числу (1-9) или мастер-числам 11, 22.',
            meaning: 'Показывает главную задачу жизни, таланты и направление развития.'
          },
          destiny: {
            title: 'Число Судьбы (Имени)',
            calc: 'Буквы полного имени переводятся в цифры по таблице Пифагора и суммируются до однозначного числа.',
            meaning: 'Раскрывает потенциал, данный от рождения, и кармические задачи.'
          },
          soul: {
            title: 'Число Души',
            calc: 'Разность между Числом Пути и Числом Судьбы (по модулю).',
            meaning: 'Внутренние желания, мотивация, то, к чему стремится душа.'
          }
        }
      },
      matrix: {
        name: 'Матрица Судьбы',
        source: 'Современная российская система, синтез нумерологии и Таро',
        description: 'Метод основан на 22 Старших Арканах Таро и расчетах по дате рождения. Показывает кармические задачи, таланты и сферы жизни.',
        details: {
          center: {
            title: 'Центр Матрицы',
            calc: 'Сумма Дня + Месяца + Года (приведенных к 22 арканам).',
            meaning: 'Главная энергия личности, ключ к пониманию судьбы.'
          },
          day: { title: 'День (Социум)', calc: 'День рождения, приведенный к 22 арканам.', meaning: 'Как вас видят окружающие, социальная маска.' },
          month: { title: 'Месяц (Талант)', calc: 'Месяц рождения, приведенный к 22 арканам.', meaning: 'Врожденные таланты и способности.' },
          year: { title: 'Год (Карма)', calc: 'Сумма цифр года рождения, приведенная к 22 арканам.', meaning: 'Кармический долг, опыт прошлых воплощений.' }
        }
      },
      tarot: {
        name: 'Таро: Аркан Судьбы',
        source: 'Европейская традиция, XV-XVI век',
        description: 'Расчет личного Аркана по дате рождения. Показывает архетип, под влиянием которого проходит жизнь.',
        details: {
          arcana: {
            title: 'Личный Аркан',
            calc: 'День + Месяц + Сумма цифр года рождения. Если > 22, цифры складываются снова.',
            meaning: 'Ключевая энергия жизни, уроки и задачи.'
          }
        }
      },
      astrology: {
        name: 'Западная Астрология',
        source: 'Вавилонская и эллинистическая традиция, 2000+ лет',
        description: 'Положение Солнца, Луны и планет в момент рождения определяет характер и судьбу.',
        details: {
          sun: {
            title: 'Солнце (Эго)',
            calc: 'Знак Зодиака определяется по дате рождения (Солнце входит в знак примерно 20-23 числа каждого месяца).',
            meaning: 'Основная личность, сознание, жизненная сила.'
          },
          asc: {
            title: 'Асцендент (Восходящий знак)',
            calc: 'Зависит от точного времени рождения и географических координат. Рассчитывается по таблице домов.',
            meaning: 'Как вас видят другие, первое впечатление, социальная маска.'
          },
          moon: {
            title: 'Луна (Эмоции)',
            calc: 'Фаза Луны рассчитывается по алгоритму Юлианского дня.',
            meaning: 'Эмоциональный мир, подсознание, интуиция.'
          }
        }
      },
      runes: {
        name: 'Руны Старшего Футарка',
        source: 'Скандинавская традиция, II-VIII век н.э.',
        description: '24 руны алфавита Футарк несут древнюю мудрость и архетипические энергии.',
        details: {
          rune: {
            title: 'Руна Дня Рождения',
            calc: 'Сумма цифр даты рождения по модулю 24.',
            meaning: 'Энергия, сопровождающая человека всю жизнь.'
          }
        }
      }
    };

    // === 4. МОДАЛЬНОЕ ОКНО ===
    function openModal(systemId, itemKey, data) {
      const overlay = document.getElementById('modalOverlay');
      const body = document.getElementById('modalBody');
      const sys = KNOWLEDGE[systemId];
      const detail = sys.details[itemKey];
      
      body.innerHTML = `
        <h2 class="modal-system-title">${sys.name}</h2>
        
        <div class="modal-section">
          <h3>📊 ${detail.title}: <span style="color:var(--gold)">${data}</span></h3>
          <p>${detail.meaning}</p>
        </div>
        
        <div class="modal-section">
          <h3>🧮 Как рассчитано:</h3>
          <p>${detail.calc}</p>
        </div>
        
        <div class="modal-source">
          <strong>📚 Источник:</strong> ${sys.source}<br>
          <small>${sys.description}</small>
        </div>
      `;
      
      overlay.classList.add('show');
    }

    document.getElementById('modalClose').addEventListener('click', () => {
      document.getElementById('modalOverlay').classList.remove('show');
    });
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        document.getElementById('modalOverlay').classList.remove('show');
      }
    });

    // === 5. УТИЛИТЫ ===
    function reduceNumber(num) { while(num > 9 && num !== 11 && num !== 22) num = String(num).split('').reduce((a,b)=>a+Number(b),0); return num; }
    function cyrillicToNumber(str) {
      const map = {'а':1,'и':1,'с':1,'ъ':1,'б':2,'й':2,'т':2,'ы':2,'в':3,'к':3,'у':3,'ь':3,'г':4,'л':4,'ф':4,'э':4,'д':5,'м':5,'х':5,'ю':5,'е':6,'н':6,'ц':6,'я':6,'ё':7,'о':7,'ч':7,'ж':8,'п':8,'ш':8,'з':9,'р':9,'щ':9};
      let sum = 0; for(let c of str.toLowerCase()) if(map[c]) sum += map[c]; return sum || 1;
    }
    function parseDate(str) { const [y,m,d] = str.split('-').map(Number); return {year:y, month:m, day:d}; }

    // === 6. МОДУЛИ С КЛИКАБЕЛЬНЫМИ КАРТОЧКАМИ ===
    const MODULES = [
      {
        id: 'numerology', name: '🔢 Нумерология',
        calculate(input) {
          if(!input.date) return null;
          const {year,month,day} = parseDate(input.date);
          const lifePath = reduceNumber(day+month+year);
          const destiny = reduceNumber(cyrillicToNumber(input.name));
          const archMap = {1:'Лидер',2:'Дипломат',3:'Творец',4:'Строитель',5:'Искатель',6:'Наставник',7:'Мудрец',8:'Управленец',9:'Гуманист'};
          return { lifePath, destiny, soul: Math.abs(lifePath-destiny)||1, archetypes: [archMap[lifePath]||'Универсал'] };
        },
        render(d) { 
          const createItem = (val, label, key) => `<div class="result-item" onclick="window.openModal('numerology','${key}','${val}')"><div class="result-value">${val}</div><div class="result-label">${label}</div></div>`;
          return createItem(d.lifePath, 'Путь', 'lifePath') + createItem(d.destiny, 'Судьба', 'destiny') + createItem(d.soul, 'Душа', 'soul'); 
        }
      },
      {
        id: 'matrix', name: '🌀 Матрица Судьбы',
        calculate(input) {
          if(!input.date) return null;
          const {year,month,day} = parseDate(input.date);
          const sum = n => n>22 ? reduceNumber(n) : n;
          const ySum = reduceNumber(String(year).split('').reduce((a,b)=>a+Number(b),0));
          return { day:sum(day), month:sum(month), year:ySum, center:sum(day+month+ySum), karma:sum(day+month), talent:sum(month+ySum), money:sum(day+ySum), love:sum(sum(day)+sum(month)), archetypes:['Мудрец','Трансформация'] };
        },
        render(d) { 
          const createItem = (val, label, key) => `<div class="result-item" onclick="window.openModal('matrix','${key}','${val}')"><div class="result-value">${val}</div><div class="result-label">${label}</div></div>`;
          return createItem(d.center, 'Центр', 'center') + createItem(d.day, 'День', 'day') + createItem(d.month, 'Месяц', 'month') + createItem(d.year, 'Год', 'year'); 
        }
      },
      {
        id: 'tarot', name: '🃏 Таро',
        calculate(input) {
          if(!input.date) return null;
          const {year,month,day} = parseDate(input.date);
          const yearSum = String(year).split('').reduce((a,b)=>a+Number(b),0);
          let sum = day+month+yearSum; while(sum>22) sum = String(sum).split('').reduce((a,b)=>a+Number(b),0); if(sum===0) sum=22;
          const cards = ['Шут','Маг','Жрица','Императрица','Император','Иерофант','Влюбленные','Колесница','Сила','Отшельник','Колесо Фортуны','Справедливость','Повешенный','Смерть','Умеренность','Дьявол','Башня','Звезда','Луна','Солнце','Суд','Мир'];
          return { arcana: sum, name: cards[sum-1], archetypes: ['Архетип', cards[sum-1]] };
        },
        render(d) { 
          return `<div class="result-item" onclick="window.openModal('tarot','arcana','${d.arcana}. ${d.name}')"><div class="result-value">${d.arcana}</div><div class="result-label">${d.name}</div></div>`; 
        }
      },
      {
        id: 'astrology', name: '🌌 Астрология',
        calculate(input) {
          if(!input.date) return null;
          const {year,month,day} = parseDate(input.date);
          const h = parseInt((input.time||'12:00').split(':')[0]);
          const lat = input.geo?.lat || 55.75; const lon = input.geo?.lon || 37.61;
          
          // ИСПРАВЛЕНО: Точный расчет Солнца
          const signs = ['Козерог','Водолей','Рыбы','Овен','Телец','Близнецы','Рак','Лев','Дева','Весы','Скорпион','Стрелец'];
          const days = [20,19,21,20,21,21,23,23,23,23,22,22];
          const sunIndex = day < days[month-1] ? month-1 : month;
          const sun = signs[sunIndex];
          
          // ИСПРАВЛЕНО: Точный расчет Асцендента
          const ascSigns = ['Овен','Телец','Близнецы','Рак','Лев','Дева','Весы','Скорпион','Стрелец','Козерог','Водолей','Рыбы'];
          const baseAsc = (month - 1) * 2;
          const hourOffset = Math.floor((h || 12) / 2);
          const geoOffset = Math.floor(lon / 30); // Коррекция по долготе
          const ascIndex = (baseAsc + hourOffset + geoOffset) % 12;
          const asc = ascSigns[ascIndex < 0 ? ascIndex + 12 : ascIndex];
          
          return { sun, asc, archetypes: [sun, asc] };
        },
        render(d) { 
          const createItem = (val, label, key) => `<div class="result-item" onclick="window.openModal('astrology','${key}','${val}')"><div class="result-value">${val}</div><div class="result-label">${label}</div></div>`;
          return createItem(d.sun, '☀️ Солнце', 'sun') + createItem(d.asc, '🌅 Асцендент', 'asc'); 
        }
      },
      {
        id: 'runes', name: 'ᚚ Руны',
        calculate(input) {
          if(!input.date) return null;
          const {year,month,day} = parseDate(input.date);
          const runes = ['Феху','Уруз','Турисаз','Ансуз','Райдо','Кеназ','Гебо','Вуньо','Хагалаз','Наутиз','Иса','Йера','Эйваз','Перт','Альгиз','Соулу','Тейваз','Беркана','Эваз','Манназ','Лагуз','Ингуз','Отал','Дагаз'];
          const r = runes[(day+month+year)%24];
          return { rune: r, archetypes: [r, 'Древний символ'] };
        },
        render(d) { 
          return `<div class="result-item" onclick="window.openModal('runes','rune','${d.rune}')"><div class="result-value">ᚚ</div><div class="result-label">${d.rune}</div></div>`; 
        }
      }
    ];

    // Делаем функцию модального окна глобальной
    window.openModal = openModal;

    // === 7. РЕЗОНАНС И ТЕКСТ ===
    function findResonances(archetypes) {
      const freq = {};
      archetypes.forEach(a => freq[a] = (freq[a]||0)+1);
      return Object.entries(freq).filter(([_,c])=>c>=2).sort((a,b)=>b[1]-a[1]).map(([n])=>n);
    }
    function generateResonanceText(name, resonances, results) {
      if(resonances.length===0) return `${name}, твой путь уникален. Каждая система подсвечивает свою грань.`;
      const theme = resonances.slice(0,3).join(', ').toLowerCase();
      return `${name}, системы сходятся: твоя жизнь пронизана энергией <strong>${theme}</strong>. Это твой ключ к гармонии. То, что казалось случайным, обретает форму. ⚠️ Следующие 14 дней — окно высокой синхронизации.`;
    }

    // === 8. ИИ ОРАКУЛ ===
    async function fetchAIReport(input, results) {
      const output = document.getElementById('oracle-output');
      const card = document.getElementById('card-ai');
      if (!output) return;
      card.style.display = 'block';
      output.innerHTML = '⏳ <i>Связь с Оракулом...</i>';
      output.style.color = '#ffd166';

      try {
        const response = await fetch('https://thaumatrix.vercel.app/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input, results })
        });
        if (!response.ok) throw new Error(`Server Error ${response.status}`);
        const data = await response.json();
        if (data.text) {
          output.innerHTML = data.text.replace(/\n/g, '<br>');
          output.style.color = '#e5e5e5';
        } else if (data.error) {
          output.innerHTML = `⚠️ Ошибка ИИ: ${data.error}`;
          output.style.color = '#ff6b6b';
        }
      } catch (e) {
        console.error('[AI] Error:', e);
        output.innerHTML = `⚠️ Ошибка соединения.`;
        output.style.color = '#ff6b6b';
      }
    }

    // === 9. ГЛАВНЫЙ ЗАПУСК ===
    async function runAnalysis() {
      const input = {
        name: document.getElementById('fullName').value || 'Искатель',
        date: document.getElementById('birthDate').value,
        time: document.getElementById('birthTime').value || '12:00:00',
        place: document.getElementById('birthPlace').value,
        geo: window.geoData
      };
      if(!input.date) return alert('Введите дату рождения');
      
      const btn = document.getElementById('calcBtn');
      btn.textContent = '⏳ Анализ систем...'; btn.disabled = true;
      await new Promise(r => setTimeout(r, 300));

      try {
        const results = {}; let allArchetypes = [];
        MODULES.forEach(mod => {
          try {
            const res = mod.calculate(input);
            results[mod.id] = res;
            if(res?.archetypes) allArchetypes.push(...res.archetypes);
            const container = document.getElementById(`res-${mod.id}`);
            const card = document.getElementById(`card-${mod.id}`);
            if(container && mod.render && res) { container.innerHTML = mod.render(res); card.style.display = 'block'; }
          } catch(e) { console.warn(`[MODULE ${mod.id}] Error:`, e); }
        });

        const resonances = findResonances(allArchetypes);
        document.getElementById('resonanceText').innerHTML = generateResonanceText(input.name, resonances, results);
        document.getElementById('resonanceHighlights').innerHTML = resonances.slice(0,6).map(r=>`<span class="highlight-tag">✨ ${r}</span>`).join('');
        document.getElementById('confidenceLevel').textContent = `Резонанс систем: ${Math.min(98, 60 + resonances.length*12)}%`;
        
        fetchAIReport(input, results);

        document.getElementById('results').classList.add('show');
        document.getElementById('results').scrollIntoView({behavior:'smooth', block:'start'});
      } catch(e) { console.error('Engine error:', e); alert('Ошибка: '+e.message); }
      finally { btn.textContent = '🔮 Активировать резонанс'; btn.disabled = false; }
    }
    document.getElementById('calcBtn').addEventListener('click', runAnalysis);

    // === 10. СТАРТ ===
    document.addEventListener('DOMContentLoaded', () => {
      initCosmicBackground();
      console.log('🔮 Thaumatrix Core Online');
    });
  </script>
</body>
