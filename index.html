<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔮 Thaumatrix — Modular Engine</title>
  <link rel="stylesheet" href="assets/main.css">
</head>
<body>
  <div class="stars-container" id="stars"></div>

  <header>
    <div class="logo">🔮 Thaumatrix</div>
    <p style="color: #a0a0a0;">Архитектура Системы v2.0</p>
  </header>

  <div class="container">
    <section class="input-section">
      <div class="form-grid">
        <div>
          <label>✨ Имя</label>
          <input type="text" id="name" placeholder="Иван" />
        </div>
        <div>
          <label>📅 Дата</label>
          <input type="date" id="date" />
        </div>
        <div>
          <label>⏰ Время</label>
          <input type="time" id="time" step="1" />
        </div>
        <div class="geo-wrapper">
          <label>📍 Город</label>
          <input type="text" id="place" placeholder="Москва" />
          <button class="geo-btn" id="geoBtn">📍</button>
          <div class="geo-status" id="geoStatus"></div>
        </div>
      </div>
      <button class="calculate-btn" id="calcBtn">🔮 Активировать Резонанс</button>
    </section>

    <section class="results-section" id="results">
      
      <!-- Контейнеры для модулей (будут заполняться автоматически) -->
      <div class="module-card" id="card-numerology" style="display:none;">
        <div class="module-title">🔢 Нумерология</div>
        <div class="result-grid" id="res-numerology"></div>
      </div>

      <!-- Секция ИИ -->
      <div class="module-card" id="ai-section" style="display:none; border-color: var(--gold);">
        <div class="module-title">🤖 Протокол ИИ-Анализ</div>
        <p style="font-size:0.8rem; color:#aaa; margin-bottom:10px;">Скопируйте этот текст в ChatGPT/Claude для получения глубокого разбора:</p>
        <div style="background:#000; padding:10px; border-radius:8px; font-family:monospace; font-size:0.8rem; max-height:200px; overflow:auto; color:#0f0;" id="ai-prompt-box"></div>
        <button onclick="copyAI()" style="margin-top:10px; padding:5px 10px; cursor:pointer;">📋 Копировать Промпт</button>
      </div>

      <div class="resonance-box">
        <h2 style="color: var(--gold);">🌌 Резонанс Систем</h2>
        <div id="resonance-count" style="font-size:1.2rem; margin: 10px 0;"></div>
      </div>

    </section>

    <footer>Thaumatrix Modular Core © 2026</footer>
  </div>

  <!-- Подключаем модульное ядро -->
  <script type="module">
    import { init } from './core/engine.js';
    init();
  </script>
  
  <script>
    function copyAI() {
      const text = document.getElementById('ai-prompt-box').innerText;
      navigator.clipboard.writeText(text).then(() => alert('Промпт скопирован! Вставьте в ИИ.'));
    }
  </script>
</body>
</html>
