<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔮 THAUMATRIX — Резонансный эзотерический движок</title>
  <meta name="description" content="Где нумерология, Матрица Судьбы, Таро, руны, астрология и Human Design сходятся в один голос." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-deep: #050508;
      --bg-purple: #1a0b2e;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #e5e5e5;
      --text-muted: #a0a0a0;
      --accent: #c5a0ff;
      --accent-glow: #9d4edd;
      --gold: #ffd166;
      --gold-glow: #e09f3e;
      --success: #06d6a0;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    
    body {
      background: radial-gradient(circle at 50% 0%, var(--bg-purple) 0%, var(--bg-deep) 60%);
      color: var(--text-main);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
      position: relative;
    }

    /* === КОСМИЧЕСКИЙ ФОН === */
    .cosmic-bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    /* Звёзды */
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: fall linear infinite;
    }

    /* Метеоры */
    .meteor {
      position: absolute;
      width: 4px; height: 4px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 0 0 8px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,1);
      animation: meteor 5s linear infinite;
      opacity: 0;
    }
    .meteor::before {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 300px; height: 1px;
      background: linear-gradient(90deg, #fff, transparent);
      right: 1px;
    }

    /* Планеты */
    .planet {
      position: absolute;
      border-radius: 50%;
      opacity: 0.6;
      animation: float 20s ease-in-out infinite;
    }
    .planet-1 {
      width: 60px; height: 60px;
      background: radial-gradient(circle at 30% 30%, #ffd166, #e09f3e);
      top: 10%; left: 10%;
      box-shadow: 0 0 30px rgba(255, 209, 102, 0.4);
      animation-delay: 0s;
    }
    .planet-2 {
      width: 40px; height: 40px;
      background: radial-gradient(circle at 30% 30%, #c5a0ff, #9d4edd);
      top: 60%; left: 85%;
      box-shadow: 0 0 25px rgba(197, 160, 255, 0.4);
      animation-delay: -5s;
    }
    .planet-3 {
      width: 80px; height: 80px;
      background: radial-gradient(circle at 30% 30%, #06d6a0, #04a87d);
      top: 70%; left: 5%;
      box-shadow: 0 0 35px rgba(6, 214, 160, 0.3);
      animation-delay: -10s;
    }
    .planet-4 {
      width: 50px; height: 50px;
      background: radial-gradient(circle at 30% 30%, #ff6b6b, #ee5a5a);
      top: 20%; left: 80%;
      box-shadow: 0 0 28px rgba(255, 107, 107, 0.4);
      animation-delay: -15s;
    }

    @keyframes fall {
      0% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(100vh) scale(1); opacity: 0; }
    }

    @keyframes meteor {
      0% { transform: rotate(215deg) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      70% { opacity: 1; }
      100% { transform: rotate(215deg) translateX(-1000px); opacity: 0; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); }
      33% { transform: translateY(-20px) translateX(10px); }
      66% { transform: translateY(10px) translateX(-10px); }
    }

    /* === UI === */
    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 3rem 1rem 1rem;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--gold), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(157, 78, 221, 0.3);
      margin-bottom: 0.5rem;
    }

    .tagline {
      color: var(--text-muted);
      font-size: 1rem;
      font-style: italic;
      letter-spacing: 1px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 10;
    }

    .input-section {
      background: rgba(15, 15, 20, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 2.5rem;
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      margin-bottom: 3rem;
      border-top: 1px solid rgba(255,255,255,0.2);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.9rem;
      color: var(--gold);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    input {
      padding: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(157, 78, 221, 0.3);
      background: rgba(255, 255, 255, 0.08);
    }

    .geo-wrapper {
      position: relative;
    }

    .geo-btn {
      position: absolute;
      right: 8px;
      top: 42px;
      background: var(--gold);
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      cursor: pointer;
      color: #000;
      font-weight: 700;
      font-size: 0.85rem;
      transition: transform 0.2s;
    }

    .geo-btn:hover {
      transform: scale(1.05);
    }

    .geo-status {
      font-size: 0.8rem;
      margin-top: 5px;
      min-height: 35px;
      line-height: 1.4;
      color: var(--text-muted);
    }

    .geo-status.success {
      color: var(--success);
    }

    .geo-status.error {
      color: #e74c3c;
    }

    .calculate-btn {
      width: 100%;
      padding: 1.2rem;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
    }

    .calculate-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(106, 17, 203, 0.5);
    }

    .calculate-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* === RESULTS === */
    .results-section {
      display: none;
      animation: fadeIn 0.8s ease-out;
    }

    .results-section.show {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .module-card {
      background: rgba(20, 20, 25, 0.7);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(10px);
    }

    .module-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--gold);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 0.5rem;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
    }

    .result-item {
      background: rgba(255,255,255,0.03);
      padding: 1rem;
      border-radius: 10px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform 0.2s;
    }

    .result-item:hover {
      transform: scale(1.02);
      background: rgba(255,255,255,0.06);
    }

    .result-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    .result-label {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .resonance-box {
      background: linear-gradient(135deg, rgba(157, 78, 221, 0.2), rgba(255, 209, 102, 0.1));
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 2.5rem;
      margin-top: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(157, 78, 221, 0.3); }
      50% { box-shadow: 0 0 40px rgba(157, 78, 221, 0.6); }
    }

    .resonance-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--gold);
      margin-bottom: 1.5rem;
      text-shadow: 0 0 10px rgba(255, 209, 102, 0.5);
    }

    .resonance-text {
      font-size: 1.2rem;
      line-height: 1.9;
      margin-bottom: 1.5rem;
      font-style: italic;
      color: var(--text-main);
    }

    .resonance-highlights {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      justify-content: center;
      margin: 1.5rem 0;
    }

    .highlight-tag {
      background: rgba(197, 160, 255, 0.2);
      border: 1px solid var(--accent);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.9rem;
      color: var(--accent);
    }

    .confidence {
      display: inline-block;
      background: var(--success);
      color: #000;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.9rem;
      margin-top: 1rem;
    }

    footer {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      position: relative;
      z-index: 10;
    }

    @media (max-width: 600px) {
      .logo { font-size: 2rem; }
      .input-section { padding: 1.5rem; }
      .resonance-text { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Космический фон -->
  <div class="cosmic-bg" id="cosmicBg"></div>

  <header>
    <div class="logo">🔮 Thaumatrix</div>
    <div class="tagline">Где системы сходятся в один голос</div>
  </header>

  <div class="container">
    <section class="input-section">
      <div class="form-grid">
        <div class="input-group">
          <label for="fullName">✨ Ваше полное имя</label>
          <input type="text" id="fullName" placeholder="Иван Иванов" />
        </div>
        <div class="input-group">
          <label for="birthDate">📅 Дата рождения</label>
          <input type="date" id="birthDate" />
        </div>
        <div class="input-group">
          <label for="birthTime">⏰ Время рождения (ЧЧ:ММ:СС)</label>
          <input type="time" id="birthTime" step="1" placeholder="12:00:00" />
        </div>
        <div class="input-group geo-wrapper">
          <label for="birthPlace">📍 Город рождения</label>
          <input type="text" id="birthPlace" placeholder="Москва" />
          <button class="geo-btn" id="geoBtn">🔍 Поиск</button>
          <div class="geo-status" id="geoStatus"></div>
        </div>
      </div>
      <button class="calculate-btn" id="calcBtn">🔮 Активировать резонанс</button>
    </section>

    <section class="results-section" id="results">
      <div class="module-card" id="card-numerology" style="display:none">
        <div class="module-title">🔢 Нумерология</div>
        <div class="result-grid" id="res-numerology"></div>
      </div>

      <div class="module-card" id="card-matrix" style="display:none">
        <div class="module-title">🌀 Матрица Судьбы</div>
        <div class="result-grid" id="res-matrix"></div>
      </div>

      <div class="module-card" id="card-tarot" style="display:none">
        <div class="module-title">🃏 Таро</div>
        <div class="result-grid" id="res-tarot"></div>
      </div>

      <div class="module-card" id="card-astrology" style="display:none">
        <div class="module-title">🌌 Астрология</div>
        <div class="result-grid" id="res-astrology"></div>
      </div>

      <div class="module-card" id="card-runes" style="display:none">
        <div class="module-title">ᚚ Руны</div>
        <div class="result-grid" id="res-runes"></div>
      </div>

      <div class="resonance-box" id="resonanceBox">
        <div class="resonance-title">🌌 РЕЗОНАНСНЫЙ ИТОГ</div>
        <div class="resonance-text" id="resonanceText"></div>
        <div class="resonance-highlights" id="resonanceHighlights"></div>
        <div class="confidence" id="confidenceLevel"></div>
      </div>
    </section>

    <footer>
      Thaumatrix — инструмент для самопознания. Не заменяет консультацию специалиста.<br>
      Создано с магией и точностью | © 2026
    </footer>
  </div>

  <!-- Подключаем модульное ядро -->
  <script type="module" src="./core/engine.js"></script>
</body>
</html>
