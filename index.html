<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔮 Thaumatrix — Modular Engine</title>
  <link rel="stylesheet" href="assets/main.css">
</head>
<body>
  <div class="stars-container" id="stars"></div>

  <header>
    <div class="logo">🔮 Thaumatrix</div>
    <p style="color: #a0a0a0;">Библиотека знаний • Резонанс систем</p>
  </header>

  <div class="container">
    <section class="input-section">
      <div class="form-grid">
        <div><label>✨ Имя</label><input type="text" id="name" placeholder="Иван" /></div>
        <div><label>📅 Дата</label><input type="date" id="date" /></div>
        <div><label>⏰ Время</label><input type="time" id="time" step="1" /></div>
        <div class="geo-wrapper">
          <label>📍 Город</label>
          <input type="text" id="place" placeholder="Москва" />
          <button class="geo-btn" id="geoBtn">📍</button>
          <div class="geo-status" id="geoStatus"></div>
        </div>
      </div>
      <button class="calculate-btn" id="calcBtn">🔮 Активировать Резонанс</button>
    </section>

    <section class="results-section" id="results">
      
      <!-- Карточки модулей (будут заполняться автоматически) -->
      <div class="module-card" id="card-numerology" style="display:none">
        <div class="module-title">🔢 Нумерология</div>
        <div class="result-grid" id="res-numerology"></div>
      </div>
      
      <div class="module-card" id="card-matrix" style="display:none">
        <div class="module-title">🌀 Матрица Судьбы</div>
        <div class="result-grid" id="res-matrix"></div>
      </div>
      
      <!-- Добавьте карточки для остальных модулей по аналогии -->

      <!-- Резонанс -->
      <div class="resonance-box">
        <div class="resonance-title">🌌 РЕЗОНАНС СИСТЕМ</div>
        <div id="resonance-text" style="font-size:1.1rem; margin:1rem 0"></div>
        <div id="resonance-tags" style="display:flex; gap:0.5rem; justify-content:center; flex-wrap:wrap"></div>
      </div>

      <!-- Локальный Оракул -->
      <div class="module-card" id="oracle-section" style="display:none; border-color: var(--gold); background: rgba(255,209,102,0.05)">
        <div class="module-title" style="color:var(--gold)">👁️ Голос Оракула</div>
        <div id="oracle-text" style="line-height:1.8"></div>
      </div>

    </section>

    <footer>Thaumatrix • Библиотека эзотерических знаний © 2026</footer>
  </div>

  <!-- Подключаем модульное ядро -->
  <script type="module">
    import { init } from './core/engine.js';
    init();
  </script>
</body>
</html>
