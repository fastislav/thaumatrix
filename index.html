<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔮 Thaumatrix — Резонансный эзотерический движок</title>
  <meta name="description" content="Где нумерология, астрология, Матрица Судьбы, Таро и руны сходятся в один голос." />
  
  <style>
    :root {
      --bg-deep: #050508;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #e5e5e5;
      --text-muted: #a0a0a0;
      --accent: #c5a0ff;
      --accent-glow: #9d4edd;
      --gold: #ffd166;
      --gold-glow: #e09f3e;
      --success: #06d6a0;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    
    body {
      background: radial-gradient(circle at 50% 0%, #1a0b2e 0%, #050508 60%);
      color: var(--text-main);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
      position: relative;
    }

    /* === МАГИЧЕСКИЙ ЗВЕЗДОПАД === */
    .stars-container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: fall linear infinite;
    }

    /* Падающие звезды (метеоры) */
    .meteor {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1), 0 0 0 8px rgba(255, 255, 255, 0.1), 0 0 20px rgba(255, 255, 255, 1);
      animation: meteor 5s linear infinite;
      opacity: 0;
    }
    
    .meteor::before {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 300px;
      height: 1px;
      background: linear-gradient(90deg, #fff, transparent);
      right: 1px;
    }

    @keyframes fall {
      0% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(100vh) scale(1); opacity: 0; }
    }

    @keyframes meteor {
      0% { transform: rotate(215deg) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      70% { opacity: 1; }
      100% { transform: rotate(215deg) translateX(-1000px); opacity: 0; }
    }

    /* UI Styles */
    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 3rem 1rem 1rem;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--gold), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(157, 78, 221, 0.3);
      margin-bottom: 0.5rem;
    }

    .tagline {
      color: var(--text-muted);
      font-size: 1rem;
      font-style: italic;
      letter-spacing: 1px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 10;
    }

    .input-section {
      background: rgba(15, 15, 20, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 2.5rem;
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      margin-bottom: 3rem;
      border-top: 1px solid rgba(255,255,255,0.2);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
    label { font-size: 0.9rem; color: var(--gold); font-weight: 500; letter-spacing: 0.5px; }

    input, select {
      padding: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(157, 78, 221, 0.3);
      background: rgba(255, 255, 255, 0.08);
    }

    .calculate-btn {
      width: 100%;
      padding: 1.2rem;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
    }
    .calculate-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(106, 17, 203, 0.5);
    }

    .results-section { display: none; animation: fadeIn 0.8s ease-out; }
    .results-section.show { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .module-card {
      background: rgba(20, 20, 25, 0.7);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(10px);
    }

    .module-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--gold);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 0.5rem;
    }

    .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; }
    .result-item {
      background: rgba(255,255,255,0.03);
      padding: 1rem;
      border-radius: 10px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform 0.2s;
    }
    .result-item:hover { transform: scale(1.02); background: rgba(255,255,255,0.06); }
    
    .result-value { font-size: 1.8rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
    .result-label { font-size: 0.85rem; color: var(--text-muted); }

    .resonance-box {
      background: linear-gradient(135deg, rgba(157, 78, 221, 0.15), rgba(255, 209, 102, 0.05));
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 2rem;
      margin-top: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .resonance-text { font-size: 1.15rem; line-height: 1.8; margin-bottom: 1rem; font-style: italic; }
    .confidence {
      display: inline-block;
      background: var(--success);
      color: #000;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.85rem;
    }

    footer { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 0.85rem; position: relative; z-index: 10; }
    
    @media (max-width: 600px) { .logo { font-size: 2rem; } .input-section { padding: 1.5rem; } }
  </style>
</head>
<body>

  <!-- Магический фон -->
  <div class="stars-container" id="starsContainer"></div>

  <header>
    <div class="logo">🔮 Thaumatrix</div>
    <div class="tagline">Где системы сходятся в один голос</div>
  </header>

  <div class="container">
    <section class="input-section">
      <div class="form-grid">
        <div class="input-group">
          <label for="fullName">✨ Ваше полное имя</label>
          <input type="text" id="fullName" placeholder="Иван Иванов" />
        </div>
        <div class="input-group">
          <label for="birthDate">📅 Дата рождения</label>
          <input type="date" id="birthDate" />
        </div>
        <div class="input-group">
          <label for="birthTime">⏰ Время рождения (ЧЧ:ММ:СС)</label>
          <!-- ✅ ДОБАВЛЕНО step="1" для секунд -->
          <input type="time" id="birthTime" step="1" placeholder="12:00:00" />
        </div>
      </div>
      <button class="calculate-btn" onclick="calculateAll()">
        🔮 Активировать резонанс
      </button>
    </section>

    <section class="results-section" id="results">
      <div class="module-card">
        <div class="module-title">🔢 Нумерология</div>
        <div class="result-grid" id="numerologyResults"></div>
      </div>

      <div class="module-card">
        <div class="module-title">🌀 Матрица Судьбы</div>
        <div class="result-grid" id="matrixResults"></div>
      </div>

      <div class="module-card">
        <div class="module-title">🃏 Таро</div>
        <div class="result-grid" id="tarotResults"></div>
      </div>

      <div class="module-card">
        <div class="module-title">ᚚ Руны</div>
        <div class="result-grid" id="runeResults"></div>
      </div>

      <div class="module-card">
        <div class="module-title">📊 Биоритмы</div>
        <div class="result-grid" id="bioResults"></div>
      </div>

      <div class="resonance-box" id="resonanceBox">
        <div class="resonance-title">🌌 Резонансный Итог</div>
        <div class="resonance-text" id="resonanceText"></div>
        <div class="confidence" id="confidenceLevel"></div>
      </div>
    </section>

    <footer>
      Thaumatrix — инструмент для самопознания. Не заменяет консультацию специалиста.<br>
      Создано с магией и точностью | © 2026
    </footer>
  </div>

  <script>
    // === ГЕНЕРАЦИЯ ЗВЕЗД И МЕТЕОРОВ ===
    function createStars() {
      const container = document.getElementById('starsContainer');
      // Обычные звезды
      for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.animationDuration = (Math.random() * 3 + 2) + 's'; // Скорость падения
        star.style.animationDelay = Math.random() * 5 + 's';
        container.appendChild(star);
      }
      // Метеоры (раз в несколько секунд)
      for (let i = 0; i < 5; i++) {
        const meteor = document.createElement('div');
        meteor.className = 'meteor';
        meteor.style.left = Math.random() * 100 + '%';
        meteor.style.animationDuration = (Math.random() * 3 + 2) + 's';
        meteor.style.animationDelay = (Math.random() * 10 + i * 5) + 's';
        container.appendChild(meteor);
      }
    }
    createStars();

    // === МОДУЛИ РАСЧЕТА (без изменений в логике) ===
    const numerology = {
      calculate(date, name) {
        const [year, month, day] = date.split('-').map(Number);
        const lifePath = this.reduce(day + month + year);
        const destiny = this.reduce(this.nameToNumber(name));
        return { lifePath, destiny, soul: Math.abs(lifePath - destiny) || 1 };
      },
      reduce(num) { while(num > 9 && num !== 11 && num !== 22) num = String(num).split('').reduce((a,b)=>a+Number(b),0); return num; },
      nameToNumber(name) {
        const map = {'а':1,'и':1,'с':1,'ъ':1,'б':2,'й':2,'т':2,'ы':2,'в':3,'к':3,'у':3,'ь':3,'г':4,'л':4,'ф':4,'э':4,'д':5,'м':5,'х':5,'ю':5,'е':6,'н':6,'ц':6,'я':6,'ё':7,'о':7,'ч':7,'ж':8,'п':8,'ш':8,'з':9,'р':9,'щ':9};
        let sum = 0; for(let c of name.toLowerCase()) if(map[c]) sum += map[c]; return sum || 1;
      }
    };

    const destinyMatrix = {
      calculate(date) {
        const [year, month, day] = date.split('-').map(Number);
        const sum = n => n > 22 ? String(n).split('').reduce((a,b)=>a+Number(b),0) : n;
        const ySum = sum(String(year).split('').reduce((a,b)=>a+Number(b),0));
        return { day: sum(day), month: sum(month), year: ySum, center: sum(day+month+ySum), karma: sum(day+month), talent: sum(month+ySum), money: sum(day+ySum), love: sum(sum(day)+sum(month)) };
      }
    };

    const tarot = {
      arcanas: ['Шут','Маг','Жрица','Императрица','Император','Иерофант','Влюбленные','Колесница','Сила','Отшельник','Колесо Фортуны','Справедливость','Повешенный','Смерть','Умеренность','Дьявол','Башня','Звезда','Луна','Солнце','Суд','Мир'],
      calculate(date) {
        const [year, month, day] = date.split('-').map(Number);
        const bArc = (day + month + String(year).split('').reduce((a,b)=>a+Number(b),0)) % 22 || 22;
        return { birth: bArc, birthName: this.arcanas[bArc-1], year: (day + month + new Date().getFullYear()) % 22 || 22 };
      }
    };

    const runes = {
      names: ['Феху','Уруз','Турисаз','Ансуз','Райдо','Кеназ','Гебо','Вуньо','Хагалаз','Наутиз','Иса','Йера','Эйваз','Перт','Альгиз','Соулу','Тейваз','Беркана','Эваз','Манназ','Лагуз','Ингуз','Отал','Дагаз'],
      calculate(date) {
        const [y, m, d] = date.split('-').map(Number);
        return { rune: this.names[(d+m+y)%24] || 'Дагаз', year: this.names[y%24] || 'Дагаз' };
      }
    };

    const biorhythms = {
      calculate(date) {
        const birth = new Date(date), today = new Date();
        const days = Math.floor((today - birth) / 86400000);
        return { phys: Math.round(Math.sin((2*Math.PI*days)/23)*100), emot: Math.round(Math.sin((2*Math.PI*days)/28)*100), intell: Math.round(Math.sin((2*Math.PI*days)/33)*100), intuit: Math.round(Math.sin((2*Math.PI*days)/38)*100) };
      }
    };

    // === ГЛАВНАЯ ФУНКЦИЯ ===
    function calculateAll() {
      const name = document.getElementById('fullName').value || 'Искатель';
      const date = document.getElementById('birthDate').value;
      if(!date) { alert('Введите дату рождения'); return; }

      const num = numerology.calculate(date, name);
      const mat = destinyMatrix.calculate(date);
      const tar = tarot.calculate(date);
      const run = runes.calculate(date);
      const bio = biorhythms.calculate(date);

      // Отрисовка
      const draw = (id, data, labels) => document.getElementById(id).innerHTML = Object.keys(data).map(k => `<div class="result-item"><div class="result-value">${data[k]}</div><div class="result-label">${labels[k]||k}</div></div>`).join('');
      
      draw('numerologyResults', num, {lifePath:'Путь', destiny:'Судьба', soul:'Душа'});
      draw('matrixResults', mat, {day:'День', month:'Месяц', year:'Год', center:'Центр', karma:'Карма', talent:'Талант', money:'Деньги', love:'Любовь'});
      document.getElementById('tarotResults').innerHTML = `<div class="result-item"><div class="result-value">${tar.birth}</div><div class="result-label">Аркан рождения<br>${tar.birthName}</div></div>`;
      document.getElementById('runeResults').innerHTML = `<div class="result-item"><div class="result-value">ᚚ</div><div class="result-label">Руна<br>${run.rune}</div></div>`;
      draw('bioResults', bio, {phys:'Физика', emot:'Эмоции', intell:'Интеллект', intuit:'Интуиция'});

      // Резонанс
      const resonances = ['Внутренняя сила', 'Глубинная трансформация']; 
      if(num.lifePath % 2 === 0) resonances.push('Структурность');
      if(bio.intuit > 50) resonances.push('Высокая интуиция');

      document.getElementById('resonanceText').innerHTML = `
        <strong>${name}</strong>, системы сходятся.<br>
        Ваш путь (${num.lifePath}) резонирует с энергией <strong>${tar.birthName}</strong>.<br>
        Сегодня ${bio.intuit > 0 ? 'энергия интуиции на подъеме' : 'время для физического действия'}.<br>
        <em>Руна дня ${run.rune} подсказывает: ${run.rune === 'Иса' ? 'Замрите и подождите' : 'Действуйте решительно'}.</em>
      `;
      document.getElementById('confidenceLevel').textContent = `Синхронизация: ${Math.floor(Math.random()*20 + 80)}%`;

      document.getElementById('results').classList.add('show');
      document.getElementById('results').scrollIntoView({behavior:'smooth'});
    }
  </script>
</body>
</html>
