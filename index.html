<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔮 Thaumatrix — Резонансный эзотерический движок</title>
  <meta name="description" content="Где нумерология, астрология, Матрица Судьбы, Таро и руны сходятся в один голос. От мурашек до ясности." />
  
  <style>
    :root {
      --bg-deep: #0b0c10;
      --bg-mid: #1f2833;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --text-main: #e5e5e5;
      --text-muted: #a0a0a0;
      --accent: #c5a0ff;
      --accent-glow: #9d4edd;
      --gold: #ffd166;
      --gold-glow: #e09f3e;
      --success: #06d6a0;
      --radius: 16px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    
    body {
      background: radial-gradient(circle at 10% 20%, #1a0b2e 0%, #0b0c10 40%, #050508 100%);
      color: var(--text-main);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
      position: relative;
    }

    /* Magical floating particles */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        radial-gradient(2px 2px at 20px 30px, var(--accent), transparent),
        radial-gradient(2px 2px at 40px 70px, var(--gold), transparent),
        radial-gradient(3px 3px at 80px 20px, var(--accent-glow), transparent),
        radial-gradient(2px 2px at 120px 50px, var(--gold-glow), transparent);
      background-size: 200px 120px;
      animation: floatParticles 20s linear infinite;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }
    
    @keyframes floatParticles { 
      to { background-position: 200px 120px; } 
    }

    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(11, 12, 16, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      padding: 1.2rem 2rem;
      text-align: center;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      background: linear-gradient(135deg, var(--gold), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(157, 78, 221, 0.3);
      margin-bottom: 0.5rem;
    }

    .tagline {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-style: italic;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .input-section {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 2rem;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      margin-bottom: 2rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    input, select {
      padding: 0.9rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text-main);
      font-size: 1rem;
      transition: all 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(197, 160, 255, 0.1);
    }

    .calculate-btn {
      width: 100%;
      padding: 1.1rem;
      background: linear-gradient(135deg, var(--accent-glow), var(--gold-glow));
      color: #000;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .calculate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(157, 78, 221, 0.4);
    }

    .results-section {
      display: none;
      animation: fadeIn 0.5s;
    }

    .results-section.show {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .module-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(10px);
    }

    .module-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--gold);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .result-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 1rem;
      border-radius: 10px;
      text-align: center;
      border: 1px solid var(--glass-border);
    }

    .result-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    .result-label {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .resonance-box {
      background: linear-gradient(135deg, rgba(157, 78, 221, 0.15), rgba(255, 209, 102, 0.1));
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 2rem;
      margin-top: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .resonance-box::before {
      content: '✦';
      position: absolute;
      top: 10px;
      left: 20px;
      font-size: 2rem;
      color: var(--gold);
      opacity: 0.5;
    }

    .resonance-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .resonance-text {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 1rem;
    }

    .confidence {
      display: inline-block;
      background: var(--success);
      color: #000;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .disclaimer {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 3rem;
      padding: 1rem;
      border-top: 1px solid var(--glass-border);
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      .logo { font-size: 1.5rem; }
      .container { padding: 1rem; }
      .input-section, .module-card { padding: 1.2rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">🔮 Thaumatrix</div>
    <div class="tagline">Где системы сходятся в один голос</div>
  </header>

  <div class="container">
    <section class="input-section">
      <div class="form-grid">
        <div class="input-group">
          <label for="fullName">✨ Ваше полное имя</label>
          <input type="text" id="fullName" placeholder="Иван Иванов" />
        </div>
        <div class="input-group">
          <label for="birthDate">📅 Дата рождения</label>
          <input type="date" id="birthDate" />
        </div>
        <div class="input-group">
          <label for="birthTime">⏰ Время рождения (если знаете)</label>
          <input type="time" id="birthTime" />
        </div>
      </div>
      <button class="calculate-btn" onclick="calculateAll()">
        🔮 Активировать резонанс
      </button>
    </section>

    <section class="results-section" id="results">
      <!-- Numerology -->
      <div class="module-card">
        <div class="module-title">🔢 Нумерология</div>
        <div class="result-grid" id="numerologyResults"></div>
      </div>

      <!-- Destiny Matrix -->
      <div class="module-card">
        <div class="module-title">🌀 Матрица Судьбы</div>
        <div class="result-grid" id="matrixResults"></div>
      </div>

      <!-- Tarot -->
      <div class="module-card">
        <div class="module-title">🃏 Таро</div>
        <div class="result-grid" id="tarotResults"></div>
      </div>

      <!-- Runes -->
      <div class="module-card">
        <div class="module-title">ᚚ Руны</div>
        <div class="result-grid" id="runeResults"></div>
      </div>

      <!-- Biorhythms -->
      <div class="module-card">
        <div class="module-title">📊 Биоритмы</div>
        <div class="result-grid" id="bioResults"></div>
      </div>

      <!-- Resonance -->
      <div class="resonance-box" id="resonanceBox">
        <div class="resonance-title">🌌 Резонансный Итог</div>
        <div class="resonance-text" id="resonanceText"></div>
        <div class="confidence" id="confidenceLevel"></div>
      </div>
    </section>

    <div class="disclaimer">
      Thaumatrix — инструмент для самопознания и рефлексии. 
      Не заменяет профессиональную консультацию.
    </div>
  </div>

  <footer>
    Создано с магией и точностью | Thaumatrix © 2026
  </footer>

  <script>
    // ===== NUMEROLOGY MODULE =====
    const numerology = {
      calculate(date, name) {
        const [year, month, day] = date.split('-').map(Number);
        const lifePath = this.reduce(day + month + year);
        const destiny = this.reduce(this.nameToNumber(name));
        const soul = this.reduce(this.nameToNumber(name, true));
        
        return {
          lifePath,
          destiny,
          soul,
          personality: this.reduce(destiny - soul)
        };
      },
      
      reduce(num) {
        while (num > 9 && num !== 11 && num !== 22) {
          num = String(num).split('').reduce((a, b) => a + Number(b), 0);
        }
        return num;
      },
      
      nameToNumber(name, vowels = false) {
        const map = {
          'а': 1, 'и': 1, 'с': 1, 'ъ': 1,
          'б': 2, 'й': 2, 'т': 2, 'ы': 2,
          'в': 3, 'к': 3, 'у': 3, 'ь': 3,
          'г': 4, 'л': 4, 'ф': 4, 'э': 4,
          'д': 5, 'м': 5, 'х': 5, 'ю': 5,
          'е': 6, 'н': 6, 'ц': 6, 'я': 6,
          'ё': 7, 'о': 7, 'ч': 7,
          'ж': 8, 'п': 8, 'ш': 8,
          'з': 9, 'р': 9, 'щ': 9
        };
        
        let sum = 0;
        const vowelsList = ['а', 'е', 'ё', 'и', 'о', 'у', 'ы', 'э', 'ю', 'я'];
        
        for (let char of name.toLowerCase()) {
          if (map[char]) {
            if (vowels && vowelsList.includes(char)) sum += map[char];
            if (!vowels) sum += map[char];
          }
        }
        
        return sum || 1;
      }
    };

    // ===== DESTINY MATRIX MODULE =====
    const destinyMatrix = {
      calculate(date) {
        const [year, month, day] = date.split('-').map(Number);
        const sum = n => n > 22 ? String(n).split('').reduce((a,b) => a + Number(b), 0) : n;
        
        const yearSum = String(year).split('').reduce((a,b) => a + Number(b), 0);
        
        return {
          day: sum(day),
          month: sum(month),
          year: sum(yearSum),
          center: sum(day + month + yearSum),
          karma: sum(day + month),
          talent: sum(month + yearSum),
          money: sum(day + yearSum),
          relationships: sum(sum(day) + sum(month))
        };
      }
    };

    // ===== TAROT MODULE =====
    const tarot = {
      arcanas: [
        'Шут', 'Маг', 'Жрица', 'Императрица', 'Император', 'Жрец', 'Влюблённые',
        'Колесница', 'Сила', 'Отшельник', 'Колесо Фортуны', 'Справедливость',
        'Повешенный', 'Смерть', 'Умеренность', 'Дьявол', 'Башня', 'Звезда',
        'Луна', 'Солнце', 'Суд', 'Мир'
      ],
      
      calculate(date) {
        const [year, month, day] = date.split('-').map(Number);
        const birthArcana = (day + month + String(year).split('').reduce((a,b) => a + Number(b), 0)) % 22;
        const personalYear = (day + month + new Date().getFullYear()) % 22;
        
        return {
          birthArcana: birthArcana || 22,
          personalYear: personalYear || 22,
          birthName: this.arcanas[birthArcana - 1] || 'Мир',
          yearName: this.arcanas[personalYear - 1] || 'Мир'
        };
      }
    };

    // ===== RUNES MODULE =====
    const runes = {
      names: [
        'Феху', 'Уруз', 'Турисаз', 'Ансуз', 'Райдо', 'Кеназ', 'Гебо',
        'Вуньо', 'Хагалаз', 'Наутиз', 'Иса', 'Йера', 'Эйваз', 'Перт',
        'Альгиз', 'Соулу', 'Тейваз', 'Беркана', 'Эваз', 'Манназ', 'Лагуз',
        'Ингуз', 'Отал', 'Дагаз'
      ],
      
      calculate(date) {
        const [year, month, day] = date.split('-').map(Number);
        const runeIndex = (day + month + year) % 24;
        const yearRune = (year % 24);
        
        return {
          birthRune: this.names[runeIndex] || 'Дагаз',
          yearRune: this.names[yearRune] || 'Дагаз',
          index: runeIndex + 1
        };
      }
    };

    // ===== BIORHYTHMS MODULE =====
    const biorhythms = {
      calculate(date) {
        const birth = new Date(date);
        const today = new Date();
        const days = Math.floor((today - birth) / (1000 * 60 * 60 * 24));
        
        const physical = Math.sin((2 * Math.PI * days) / 23) * 100;
        const emotional = Math.sin((2 * Math.PI * days) / 28) * 100;
        const intellectual = Math.sin((2 * Math.PI * days) / 33) * 100;
        const intuitive = Math.sin((2 * Math.PI * days) / 38) * 100;
        
        return {
          physical: Math.round(physical),
          emotional: Math.round(emotional),
          intellectual: Math.round(intellectual),
          intuitive: Math.round(intuitive)
        };
      }
    };

    // ===== RESONANCE ENGINE =====
    function findResonances(results) {
      const archetypes = {
        '7': ['Мудрец', 'Наблюдатель', 'Аналитик'],
        '11': ['Просветлённый', 'Визионер', 'Интуит'],
        '22': ['Строитель', 'Мастер', 'Реализатор'],
        'VI': ['Влюблённые', 'Выбор', 'Гармония'],
        'VII': ['Колесница', 'Воля', 'Движение'],
        'XVIII': ['Луна', 'Иллюзии', 'Подсознание']
      };
      
      let matches = [];
      const allValues = Object.values(results).flat();
      
      allValues.forEach(val => {
        if (archetypes[val]) {
          matches = matches.concat(archetypes[val]);
        }
      });
      
      const freq = {};
      matches.forEach(m => freq[m] = (freq[m] || 0) + 1);
      
      return Object.entries(freq)
        .filter(([_, count]) => count >= 2)
        .map(([name]) => name);
    }

    function generateResonanceText(results, resonances) {
      const templates = [
        `Системы сходятся: вы входите в период ${resonances[0] || 'глубокой трансформации'}.`,
        `То, что казалось случайным, обретает смысл. Доверьтесь потоку.`,
        `Ваша сила сейчас — в ${resonances[1] || 'внутреннем наблюдении'}.`,
        `⚠️ Внимание: следующие 14 дней — окно высокой синхронизации.`
      ];
      
      return templates.join(' ');
    }

    // ===== MAIN CALCULATION =====
    function calculateAll() {
      const name = document.getElementById('fullName').value;
      const date = document.getElementById('birthDate').value;
      
      if (!date) {
        alert('Введите дату рождения');
        return;
      }
      
      // Calculate all modules
      const num = numerology.calculate(date, name);
      const matrix = destinyMatrix.calculate(date);
      const tarot = window.tarot.calculate(date);
      const rune = runes.calculate(date);
      const bio = biorhythms.calculate(date);
      
      // Display results
      displayNumerology(num);
      displayMatrix(matrix);
      displayTarot(tarot);
      displayRunes(rune);
      displayBiorhythms(bio);
      
      // Find resonances
      const allResults = { num, matrix, tarot, rune, bio };
      const resonances = findResonances(allResults);
      const text = generateResonanceText(allResults, resonances);
      const confidence = Math.min(95, 60 + resonances.length * 10);
      
      document.getElementById('resonanceText').textContent = text;
      document.getElementById('confidenceLevel').textContent = `Уверенность резонанса: ${confidence}%`;
      
      // Show results
      document.getElementById('results').classList.add('show');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function displayNumerology(data) {
      const meanings = {
        lifePath: 'Путь жизни',
        destiny: 'Судьба',
        soul: 'Душа',
        personality: 'Личность'
      };
      
      let html = '';
      for (let [key, value] of Object.entries(data)) {
        html += `
          <div class="result-item">
            <div class="result-value">${value}</div>
            <div class="result-label">${meanings[key]}</div>
          </div>
        `;
      }
      document.getElementById('numerologyResults').innerHTML = html;
    }

    function displayMatrix(data) {
      const meanings = {
        day: 'День (социум)',
        month: 'Месяц (талант)',
        year: 'Год (карма)',
        center: 'Центр (ядро)',
        karma: 'Карма',
        talent: 'Талант',
        money: 'Деньги',
        relationships: 'Отношения'
      };
      
      let html = '';
      for (let [key, value] of Object.entries(data)) {
        html += `
          <div class="result-item">
            <div class="result-value">${value}</div>
            <div class="result-label">${meanings[key]}</div>
          </div>
        `;
      }
      document.getElementById('matrixResults').innerHTML = html;
    }

    function displayTarot(data) {
      document.getElementById('tarotResults').innerHTML = `
        <div class="result-item">
          <div class="result-value">${data.birthArcana}</div>
          <div class="result-label">Аркан рождения<br>${data.birthName}</div>
        </div>
        <div class="result-item">
          <div class="result-value">${data.personalYear}</div>
          <div class="result-label">Личный год<br>${data.yearName}</div>
        </div>
      `;
    }

    function displayRunes(data) {
      document.getElementById('runeResults').innerHTML = `
        <div class="result-item">
          <div class="result-value">${data.index}</div>
          <div class="result-label">Руна рождения<br>${data.birthRune}</div>
        </div>
        <div class="result-item">
          <div class="result-value">—</div>
          <div class="result-label">Руна года<br>${data.yearRune}</div>
        </div>
      `;
    }

    function displayBiorhythms(data) {
      const getColor = v => v > 0 ? '#06d6a0' : '#e74c3c';
      
      document.getElementById('bioResults').innerHTML = `
        <div class="result-item">
          <div class="result-value" style="color: ${getColor(data.physical)}">${data.physical}%</div>
          <div class="result-label">Физический</div>
        </div>
        <div class="result-item">
          <div class="result-value" style="color: ${getColor(data.emotional)}">${data.emotional}%</div>
          <div class="result-label">Эмоциональный</div>
        </div>
        <div class="result-item">
          <div class="result-value" style="color: ${getColor(data.intellectual)}">${data.intellectual}%</div>
          <div class="result-label">Интеллектуальный</div>
        </div>
        <div class="result-item">
          <div class="result-value" style="color: ${getColor(data.intuitive)}">${data.intuitive}%</div>
          <div class="result-label">Интуитивный</div>
        </div>
      `;
    }
  </script>
</body>
</html>
